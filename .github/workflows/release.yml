# On a version tag: run the suite, build optimized binaries for macOS (arm64)
# and Linux (x86_64), and attach the tarballs to the GitHub release for that
# tag. Every build step is a make target, runnable locally as-is.
#
# The binaries carry the generic targets (sample_gfx, cyd, cyd_tft); the
# Clawdmeter-backed Waveshare targets need a source build against a firmware
# checkout (README, CLAWDMETER_SRC). Bundling them here would freeze an
# upstream firmware snapshot into the release, and upstream currently lags
# the firmware these targets are built for; revisit when upstream syncs.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)publish, e.g. v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - run: make build
      - run: make test
      - run: make dist
      - name: Attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The release is normally created first with curated notes; a bare
          # tag push still gets one (the race between matrix jobs is harmless).
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --verify-tag --generate-notes || true
          gh release upload "$TAG" dist/*.tar.gz --clobber

  # Name-reservation packages on crates.io and PyPI, stamped from the tag.
  # Idempotent: an already-published version is skipped, so a dispatch re-run
  # (partial-publish recovery) is safe.
  registries:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      # No tag ref here: the manifests are version-independent, and a
      # dispatched backfill tag may predate packaging/. Only the version
      # string comes from the tag.
      - uses: actions/checkout@v4
      - name: Stamp the version from the tag
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^version = \"0.0.0\"/version = \"$VERSION\"/" packaging/crate/Cargo.toml
          sed -i "s/^version = \"0.0.0\"/version = \"$VERSION\"/" packaging/pypi/pyproject.toml
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          if curl -sf -A esprite-release "https://crates.io/api/v1/crates/esprite/$VERSION" >/dev/null; then
            echo "crates.io already has $VERSION; skipping"
          else
            cargo publish --allow-dirty --manifest-path packaging/crate/Cargo.toml
          fi
      - name: Publish to PyPI
        run: |
          pipx run --spec build pyproject-build --outdir packaging/pypi/dist packaging/pypi
          pipx run twine upload --skip-existing packaging/pypi/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
