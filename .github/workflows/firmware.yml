# Manual check: does esprite still build and pass against the upstream
# Clawdmeter firmware? Dispatch-only for now: upstream main currently lags the
# local firmware checkout by a full subsystem (the WiFi/OTA stack), so a
# scheduled run would be red for reasons outside this repo. Flip on a schedule
# and a push trigger once upstream carries the WiFi stack. Every step is a
# make target, runnable locally as-is.
name: firmware

on:
  workflow_dispatch:

jobs:
  firmware-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone upstream Clawdmeter
        run: git clone --depth 1 https://github.com/HermannBjorgvin/Clawdmeter fw
      - run: make build CLAWDMETER_SRC=$PWD/fw/firmware/src
      - run: make test CLAWDMETER_SRC=$PWD/fw/firmware/src
      - name: Render the demo scenario
        run: make scenario TARGET=waveshare_amoled_216_c6 CLAWDMETER_SRC=$PWD/fw/firmware/src
      - uses: actions/upload-artifact@v4
        with:
          name: scenario-frames
          path: "*.png"
          retention-days: 14
